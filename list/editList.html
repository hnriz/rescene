                                </form>
                            </div>

                <div class="upperListInfo">

                        <img src="../src/img/listIcon.jfif" alt="List Icon" class="listAvatar">
                    </div>

                    <div class="column2">
                        <div class="mainInfo">
                            <div class="input">
                                <input type="text" placeholder="My Favs">
                            </div>
                        </div>


                        <div class="editOptions">
                            <button class="editOption">
                                <i class="fa-solid fa-trash"></i>
                                <h3>DELETAR LISTA</h3>
                            </button>

                            <button class="editOption">
                                <i class="fa-solid fa-xmark"></i>
                                <h3>PARAR DE EDITAR</h3>
                            </button>

                            <button class="saveOption">
                                <i class="fa-solid fa-floppy-disk"></i>
                                <h3>SALVAR</h3>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="listSeparator"></div>

                <section class="listContent">
                    <a href="#" class="card addCard">
