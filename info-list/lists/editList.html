                </div>
            </div>

        <div class="upperListInfo">

                    <div class="update">

                    <div class="geralInfo">
                        <a href="" class="user">

                        </a>

                        <h3>20 MOVIES AND TV SHOWS</h3>
                    </div>
                </div>


                <div class="editOptions">
                    <a href="" class="editOption">
                        <i class="fa-solid fa-trash"></i>
                        <h3>DELETE LIST</h3>
                    </a>

                    <a href="" class="editOption">
                        <i class="fa-solid fa-xmark"></i>
                        <h3>STOP EDITING</h3>
                    </a>
                </div>
            </div>
        </div>

        <div class="list-separator"></div>
    
        <section class="list-content">
            <a href="#" class="card addCard">
